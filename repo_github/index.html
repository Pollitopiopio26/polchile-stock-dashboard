<style>
  :root {
    --bg: #F4F3EF; --surface: #FFFFFF; --text: #18181A; --text-2: #5C5B58; --text-3: #9A9894;
    --border: rgba(0,0,0,0.08);

    --fam-a: #6B62D4; --fam-b: #0284c7; --fam-c: #ea580c;
    --r: 12px;
  }

  body { font-family: "Helvetica Neue", Helvetica, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; padding: 24px 30px; }
  .main { max-width: 1240px; margin: 0 auto; }
  .header { display:flex; justify-content:space-between; align-items:center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .title { font-size: 21px; font-weight: 600; }
  .subtitle { color: var(--text-3); margin-top: 2px; }
  .btn { padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-weight: bold; }
  .btn:hover { background: #eee; }
  .search { width:100%; padding: 12px 16px; font-size: 14px; border: 2px solid var(--border); border-radius: var(--r); margin-bottom: 14px; outline:none; }
  .search:focus { border-color: var(--fam-a); }
  .error-msg { background: var(--bad); color:#fff; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-weight:bold; }

  .bodega-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom: 20px; }
  .bodega-tab { padding: 7px 14px; background: var(--surface); border:1px solid var(--border); border-radius: 20px; cursor:pointer; font-size:12px; font-weight:600; color: var(--text-2); }
  .bodega-tab.active { background: var(--text); color:#fff; border-color: var(--text); }
  .bodega-tab.active.segunda { background: #b45309; border-color: #b45309; }

  .familia-section { margin-bottom: 26px; background: var(--surface); border-radius: var(--r); border:1px solid var(--border); overflow:hidden; }
  .familia-head { display:flex; align-items:center; gap:14px; padding: 14px 18px; color:#fff; }
  .familia-icon { width:44px; height:44px; border-radius:8px; background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  .familia-name { font-size:15px; font-weight:700; letter-spacing:0.3px; }
  .familia-count { font-size:11px; opacity:0.85; }

  table { width:100%; border-collapse: collapse; }
  th { font-size:10px; text-transform:uppercase; color:var(--text-3); text-align:left; padding:10px 14px; border-bottom:1px solid var(--border); background:#fafafa; }
  td { padding:10px 14px; border-bottom:1px solid var(--border); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  .prod-cell { display:flex; align-items:center; gap:10px; }
  .prod-img { width:46px; height:46px; border-radius:8px; object-fit:cover; background:#eee; flex-shrink:0; cursor: zoom-in; transition: transform 0.15s; }
  .prod-img:hover { transform: scale(1.08); }
  .prod-name { font-weight:500; }
  .mono { font-family: monospace; color: var(--text-2); font-size: 11px; }
  .precio { font-weight:600; }
  .bar-wrap { background:#eee; border-radius:6px; height:8px; width:100%; overflow:hidden; }
  .bar-fill { height:100%; border-radius:6px; }
  .stock-nums { font-size:11px; color: var(--text-2); margin-top:4px; display:flex; gap:8px; }
  .restante-ok { color: var(--ok); font-weight:bold; }
  .restante-falta { color: var(--bad); font-weight:bold; }
  .loading { text-align:center; padding:50px; color:var(--text-3); font-weight:bold; }

  .lightbox-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display:flex; align-items:center; justify-content:center; z-index: 1000; padding: 30px; }
  .lightbox-box { background: var(--surface); border-radius: var(--r); padding: 16px; max-width: 90vw; max-height: 90vh; display:flex; flex-direction:column; align-items:center; gap: 10px; }
  .lightbox-box img { max-width: 80vw; max-height: 70vh; border-radius: 8px; object-fit: contain; }
  .lightbox-caption { font-weight:600; text-align:center; }
  .lightbox-close { align-self:flex-end; background:none; border:none; font-size:20px; cursor:pointer; color: var(--text-2); }

  .login-wrap { min-height: 80vh; display:flex; align-items:center; justify-content:center; }
  .login-card { background: var(--surface); border:1px solid var(--border); border-radius: var(--r); padding: 32px; width: 100%; max-width: 360px; }
  .login-card h1 { font-size: 18px; margin-bottom: 4px; }
  .login-card p { color: var(--text-3); margin-bottom: 20px; font-size: 12px; }
  .login-card input { width:100%; padding: 11px 14px; border: 2px solid var(--border); border-radius: 8px; margin-bottom: 12px; font-size: 14px; outline:none; }
  .login-card input:focus { border-color: var(--fam-a); }
  .login-card button { width:100%; padding: 11px; background: var(--text); color:#fff; border:none; border-radius: 8px; font-weight:bold; cursor:pointer; font-size: 14px; }

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const FAMILIAS_CONFIG = {
  "Paneles Aislados":        { color: "var(--fam-a)", icon: "🧱" },
  "Revestimientos Metálicos":{ color: "var(--fam-b)", icon: "🏠" },
  "Accesorios e Instalación":{ color: "var(--fam-c)", icon: "🔩" },
  "Productos de Segunda":    { color: "#b45309", icon: "🏷️" },
};

// Las fotos de referencia viven como archivos en /img dentro del repo,
// nombradas igual que la columna "tipo" del catálogo (ej. img/pol_panel_4.jpg)
function getImagen(tipo) {
  return tipo ? `img/${tipo}.jpg` : null;
}

function FamiliaBlock({ nombre, items, bodegaActiva, onImgClick, cfgOverride }) {
  const cfg = cfgOverride || FAMILIAS_CONFIG[nombre] || { color: "var(--text-2)", icon: "📦" };

  return (
    <div className="familia-section">
      <div className="familia-head" style={{ backgroundColor: cfg.color }}>
        <div className="familia-icon">{cfg.icon}</div>
        <div>
          <div className="familia-name">{nombre}</div>
          <div className="familia-count">{items.length} productos</div>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th style={{width:'34%'}}>Producto</th>
            <th style={{width:'12%'}}>Precio</th>
            <th style={{width:'38%'}}>Stock (Actual / Total / Restante){bodegaActiva !== 'Todas' ? ' · ' + bodegaActiva : ''}</th>
          </tr>
        </thead>
        <tbody>
          {items.map((p, idx) => {
            const actualMostrado = bodegaActiva === 'Todas'
              ? p.stockActual
              : (p.stockPorBodega[bodegaActiva] || 0);
            const pct = p.stockTotal > 0 ? Math.min((actualMostrado / p.stockTotal) * 100, 100) : 0;
            const cumple = p.stockTotal > 0 && actualMostrado >= p.stockTotal;
            const img = getImagen(p.tipo);
            return (
              <tr key={idx}>
                <td>
                  <div className="prod-cell">
                    {img ? (
                      <img
                        className="prod-img"
                        src={img}
                        onClick={() => onImgClick(img, p.producto)}
                        onError={e => { e.target.style.visibility = 'hidden'; }}
                      />
                    ) : <div className="prod-img"></div>}
                    <div>
                      <div className="prod-name">{p.producto}</div>
                      <div className="mono">{p.codigo}</div>
                    </div>
                  </div>
                </td>
                <td className="precio">{p.precio ? p.precio.toLocaleString('es-CL', {style:'currency', currency:'CLP'}) : 'Consultar'}</td>
                <td>
                  <div className="bar-wrap">
                    <div className="bar-fill" style={{ width: pct + '%', backgroundColor: cfg.color }}></div>
                  </div>
                  <div className="stock-nums">
                    <span>Actual: <b>{actualMostrado}</b></span>
                    <span>Total: <b>{p.stockTotal || '-'}</b></span>
                    <span className={cumple ? "restante-ok" : "restante-falta"}>
                      Restante: {p.stockTotal ? Math.max(p.stockTotal - actualMostrado, 0) : '-'}
                    </span>
                  </div>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// Reconstruye exactamente la misma forma de datos que antes armaba Code.gs,
// pero leyendo directo desde las 3 tablas de Supabase.
async function cargarDashboard() {
  const [catRes, stockRes, segRes] = await Promise.all([
    supabaseClient.from('catalogo').select('*'),
    supabaseClient.from('stock').select('*'),
    supabaseClient.from('productos_segunda').select('*')
  ]);

  if (catRes.error) throw new Error('Catalogo: ' + catRes.error.message);
  if (stockRes.error) throw new Error('Stock: ' + stockRes.error.message);

  const stockPorCodigo = {};
  const bodegasSet = {};
  (stockRes.data || []).forEach(row => {
    const codigo = (row.codigo || '').trim().toUpperCase();
    if (!codigo) return;
    const cantidad = parseFloat(row.stk_fisico) || 0;
    const bodega = (row.bodega_nombre || 'Sin bodega').trim();
    if (!stockPorCodigo[codigo]) stockPorCodigo[codigo] = { total: 0, bodegas: {} };
    stockPorCodigo[codigo].total += cantidad;
    stockPorCodigo[codigo].bodegas[bodega] = (stockPorCodigo[codigo].bodegas[bodega] || 0) + cantidad;
    bodegasSet[bodega] = true;
  });

  const productos = (catRes.data || []).map(row => {
    const codigo = (row.codigo || '').trim();
    const info = stockPorCodigo[codigo.toUpperCase()] || { total: 0, bodegas: {} };
    const total = parseFloat(row.stock_total) || 0;
    return {
      codigo,
      producto: row.producto || '',
      familia: row.familia || 'Sin familia',
      tipo: row.tipo || '',
      precio: parseFloat(row.precio) || 0,
      stockActual: info.total,
      stockPorBodega: info.bodegas,
      stockTotal: total,
      restante: Math.max(total - info.total, 0)
    };
  });

  const segundaPorCodigo = {};
  (segRes.data || []).forEach(row => {
    const codigo = (row.codigo || '').trim().toUpperCase();
    if (!codigo) return;
    const cantidad = parseFloat(row.stk_fisico) || 0;
    const bodega = (row.bodega_nombre || 'Bodega de segunda').trim();
    if (!segundaPorCodigo[codigo]) segundaPorCodigo[codigo] = { nombre: '', bodegas: {} };
    segundaPorCodigo[codigo].bodegas[bodega] = (segundaPorCodigo[codigo].bodegas[bodega] || 0) + cantidad;
    if (row.nombre) segundaPorCodigo[codigo].nombre = row.nombre;
  });
  Object.keys(segundaPorCodigo).forEach(codigoUpper => {
    const info = segundaPorCodigo[codigoUpper];
    const totalEnBodegas = Object.keys(info.bodegas).reduce((sum, b) => sum + info.bodegas[b], 0);
    productos.push({
      codigo: codigoUpper,
      producto: info.nombre || codigoUpper,
      familia: 'Productos de Segunda',
      tipo: '',
      precio: 0,
      stockActual: totalEnBodegas,
      stockPorBodega: info.bodegas,
      stockTotal: 0,
      restante: 0
    });
  });

  return { productos, bodegas: Object.keys(bodegasSet).sort() };
}

function LoginScreen({ onLoggedIn }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState(null);
  const [cargando, setCargando] = useState(false);
  const [modoRecuperar, setModoRecuperar] = useState(false);
  const [recuperarOk, setRecuperarOk] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError(null);
    setCargando(true);
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    setCargando(false);
    if (error) { setError('Correo o contraseña incorrectos.'); return; }
    onLoggedIn(data.session);
  };

  const handleRecuperar = async (e) => {
    e.preventDefault();
    setError(null);
    setCargando(true);
    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + window.location.pathname
    });
    setCargando(false);
    if (error) { setError(error.message); return; }
    setRecuperarOk(true);
  };

  if (modoRecuperar) {
    return (
      <div className="login-wrap">
        <form className="login-card" onSubmit={handleRecuperar}>
          <h1>Recuperar contraseña</h1>
          <p>Te enviaremos un correo con un enlace para elegir una contraseña nueva.</p>
          {recuperarOk ? (
            <div className="login-ok">Listo, revisa tu correo ({email}) y sigue el enlace.</div>
          ) : (
            <React.Fragment>
              <input type="email" placeholder="Correo" value={email} onChange={e => setEmail(e.target.value)} required />
              <button type="submit" disabled={cargando}>{cargando ? 'Enviando...' : 'Enviar enlace'}</button>
              {error && <div className="login-error">{error}</div>}
            </React.Fragment>
          )}
          <button type="button" className="link-btn" onClick={() => { setModoRecuperar(false); setRecuperarOk(false); setError(null); }}>
            ← Volver a ingresar
          </button>
        </form>
      </div>
    );
  }

  return (
    <div className="login-wrap">
      <form className="login-card" onSubmit={handleSubmit}>
        <h1>Control de Stock · Polchile</h1>
        <p>Ingresa con tu cuenta para ver el dashboard.</p>
        <input type="email" placeholder="Correo" value={email} onChange={e => setEmail(e.target.value)} required />
        <input type="password" placeholder="Contraseña" value={password} onChange={e => setPassword(e.target.value)} required />
        <button type="submit" disabled={cargando}>{cargando ? 'Ingresando...' : 'Ingresar'}</button>
        {error && <div className="login-error">{error}</div>}
        <button type="button" className="link-btn" onClick={() => setModoRecuperar(true)}>
          ¿Olvidaste tu contraseña?
        </button>
      </form>
    </div>
  );

}

function ChangePasswordModal({ onClose }) {
  const [pass1, setPass1] = useState('');
  const [pass2, setPass2] = useState('');
  const [error, setError] = useState(null);
  const [ok, setOk] = useState(false);
  const [cargando, setCargando] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError(null);
    if (pass1.length < 6) { setError('Mínimo 6 caracteres.'); return; }
    if (pass1 !== pass2) { setError('Las contraseñas no coinciden.'); return; }
    setCargando(true);
    const { error } = await supabaseClient.auth.updateUser({ password: pass1 });
    setCargando(false);
    if (error) { setError(error.message); return; }
    setOk(true);
  };

  return (
    <div className="lightbox-overlay" onClick={onClose}>
      <div className="lightbox-box" onClick={e => e.stopPropagation()} style={{ alignItems: 'stretch', minWidth: 300 }}>
        <button className="lightbox-close" onClick={onClose}>✕</button>
        {ok ? (
          <div>
            <p className="modal-title">Contraseña actualizada ✅</p>
            <button className="btn" onClick={onClose} style={{ width: '100%' }}>Cerrar</button>
          </div>
        ) : (
          <form className="modal-form" onSubmit={handleSubmit}>
            <p className="modal-title">Cambiar contraseña</p>
            <input type="password" placeholder="Nueva contraseña" value={pass1} onChange={e => setPass1(e.target.value)} required />
            <input type="password" placeholder="Confirmar contraseña" value={pass2} onChange={e => setPass2(e.target.value)} required />
            <button type="submit" className="btn" disabled={cargando} style={{ width: '100%' }}>
              {cargando ? 'Guardando...' : 'Guardar'}
            </button>
            {error && <div className="login-error">{error}</div>}
          </form>
        )}
      </div>
    </div>
  );
}

function Dashboard({ session, onLogout }) {
  const [productos, setProductos] = useState([]);
  const [bodegas, setBodegas] = useState([]);
  const [bodegaActiva, setBodegaActiva] = useState('Todas');
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [search, setSearch] = useState("");
  const [imagenAmpliada, setImagenAmpliada] = useState(null);
  const [vista, setVista] = useState('familia');
  const [mostrarCambioPassword, setMostrarCambioPassword] = useState(false);

  const FAMILIA_SEGUNDA = "Productos de Segunda";

  const fetchData = () => {
    setLoading(true);
    setError(null);
    cargarDashboard()
      .then(res => {
        setProductos(res.productos);
        setBodegas(res.bodegas);
        setLoading(false);
      })
      .catch(err => { setError(err.message); setLoading(false); });
  };

  useEffect(() => { fetchData(); }, []);

  const familiasAgrupadas = useMemo(() => {
    const term = search.toLowerCase();
    const filtrado = productos.filter(p =>
      p.familia !== FAMILIA_SEGUNDA &&
      (p.producto.toLowerCase().includes(term) || p.codigo.toLowerCase().includes(term))
    );
    const grupos = {};
    filtrado.forEach(p => {
      if (!grupos[p.familia]) grupos[p.familia] = [];
      grupos[p.familia].push(p);
    });
    return grupos;
  }, [productos, search]);

  const bodegasAgrupadas = useMemo(() => {
    const term = search.toLowerCase();
    const filtrado = productos.filter(p =>
      p.familia !== FAMILIA_SEGUNDA &&
      (p.producto.toLowerCase().includes(term) || p.codigo.toLowerCase().includes(term))
    );
    const grupos = {};
    bodegas.forEach(b => { grupos[b] = []; });
    filtrado.forEach(p => {
      Object.keys(p.stockPorBodega).forEach(b => {
        if ((p.stockPorBodega[b] || 0) > 0) {
          if (!grupos[b]) grupos[b] = [];
          grupos[b].push(p);
        }
      });
    });
    Object.keys(grupos).forEach(b => { if (grupos[b].length === 0) delete grupos[b]; });
    return grupos;
  }, [productos, bodegas, search]);

  const productosSegunda = useMemo(() => {
    const term = search.toLowerCase();
    return productos.filter(p =>
      p.familia === FAMILIA_SEGUNDA &&
      (p.producto.toLowerCase().includes(term) || p.codigo.toLowerCase().includes(term))
    );
  }, [productos, search]);

  const segundaAgrupadaPorBodega = useMemo(() => {
    const grupos = {};
    productosSegunda.forEach(p => {
      Object.keys(p.stockPorBodega).forEach(b => {
        if ((p.stockPorBodega[b] || 0) > 0) {
          if (!grupos[b]) grupos[b] = [];
          grupos[b].push(p);
        }
      });
    });
    return grupos;
  }, [productosSegunda]);

  return (
    <div className="main">
      <div className="header">
        <div>
          <div className="title">Control de Stock por Familias</div>
          <div className="subtitle">{session.user.email} · Actual, objetivo y restante · por bodega · con precios</div>
        </div>
        <div style={{display:'flex', gap:8}}>
          <button onClick={fetchData} className="btn">↻ Sincronizar</button>
          <button onClick={() => setMostrarCambioPassword(true)} className="btn">🔑 Cambiar contraseña</button>
          <button onClick={onLogout} className="btn">Cerrar sesión</button>
        </div>
      </div>

      {mostrarCambioPassword && <ChangePasswordModal onClose={() => setMostrarCambioPassword(false)} />}

      {error && <div className="error-msg">⚠️ {error}</div>}

      <div className="bodega-tabs">
        <div className={"bodega-tab" + (vista === 'familia' ? ' active' : '')} onClick={() => setVista('familia')}>📦 Vista por Familia</div>
        <div className={"bodega-tab" + (vista === 'bodega' ? ' active' : '')} onClick={() => setVista('bodega')}>🏬 Vista por Bodega</div>
        <div className={"bodega-tab" + (vista === 'segunda' ? ' active segunda' : '')} onClick={() => setVista('segunda')}>🏷️ Productos de Segunda</div>
      </div>

      {vista === 'familia' && (
        <div className="bodega-tabs">
          <div className={"bodega-tab" + (bodegaActiva === 'Todas' ? ' active' : '')} onClick={() => setBodegaActiva('Todas')}>Todas las bodegas</div>
          {bodegas.map(b => (
            <div key={b} className={"bodega-tab" + (bodegaActiva === b ? ' active' : '')} onClick={() => setBodegaActiva(b)}>{b}</div>
          ))}
        </div>
      )}

      <input className="search" placeholder="Buscar por producto o código..." value={search} onChange={e => setSearch(e.target.value)} />

      {loading ? (
        <div className="loading">CARGANDO STOCK...</div>
      ) : vista === 'familia' ? (
        Object.keys(familiasAgrupadas).map(fam => (
          <FamiliaBlock key={fam} nombre={fam} items={familiasAgrupadas[fam]} bodegaActiva={bodegaActiva}
            onImgClick={(src, nombre) => setImagenAmpliada({ src, nombre })} />
        ))
      ) : vista === 'bodega' ? (
        Object.keys(bodegasAgrupadas).map(bod => (
          <FamiliaBlock key={bod} nombre={bod} items={bodegasAgrupadas[bod]} bodegaActiva={bod}
            cfgOverride={{ color: "#334155", icon: "🏬" }}
            onImgClick={(src, nombre) => setImagenAmpliada({ src, nombre })} />
        ))
      ) : (
        Object.keys(segundaAgrupadaPorBodega).length > 0 ? (
          Object.keys(segundaAgrupadaPorBodega).map(bod => (
            <FamiliaBlock key={bod} nombre={bod} items={segundaAgrupadaPorBodega[bod]} bodegaActiva={bod}
              cfgOverride={{ color: "#b45309", icon: "🏷️" }}
              onImgClick={(src, nombre) => setImagenAmpliada({ src, nombre })} />
          ))
        ) : (
          <div className="loading">Sin productos de segunda por ahora.</div>
        )
      )}

      {imagenAmpliada && (
        <div className="lightbox-overlay" onClick={() => setImagenAmpliada(null)}>
          <div className="lightbox-box" onClick={e => e.stopPropagation()}>
            <button className="lightbox-close" onClick={() => setImagenAmpliada(null)}>✕</button>
            <img src={imagenAmpliada.src} />
            <div className="lightbox-caption">{imagenAmpliada.nombre}</div>
          </div>
        </div>
      )}
    </div>
  );
}

function ProduccionView({ session, onLogout }) {
  const [pendientes, setPendientes] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [search, setSearch] = useState("");
  const [mostrarCambioPassword, setMostrarCambioPassword] = useState(false);

  const fetchData = () => {
    setLoading(true);
    setError(null);
    cargarDashboard()
      .then(res => {
        const faltantes = res.productos
          .filter(p => p.familia !== "Productos de Segunda" && p.stockTotal > 0 && p.restante > 0)
          .sort((a, b) => b.restante - a.restante);
        setPendientes(faltantes);
        setLoading(false);
      })
      .catch(err => { setError(err.message); setLoading(false); });
  };

  useEffect(() => { fetchData(); }, []);

  const filtrados = useMemo(() => {
    const term = search.toLowerCase();
    return pendientes.filter(p =>
      p.producto.toLowerCase().includes(term) || p.codigo.toLowerCase().includes(term)
    );
  }, [pendientes, search]);

  return (
    <div className="main">
      <div className="header">
        <div>
          <div className="title">Qué falta fabricar</div>
          <div className="subtitle">{session.user.email} · Solo productos con stock objetivo pendiente</div>
        </div>
        <div style={{display:'flex', gap:8}}>
          <button onClick={fetchData} className="btn">↻ Sincronizar</button>
          <button onClick={() => setMostrarCambioPassword(true)} className="btn">🔑 Cambiar contraseña</button>
          <button onClick={onLogout} className="btn">Cerrar sesión</button>
        </div>
      </div>

      {mostrarCambioPassword && <ChangePasswordModal onClose={() => setMostrarCambioPassword(false)} />}

      {error && <div className="error-msg">⚠️ {error}</div>}

      <input className="search" placeholder="Buscar por producto o código..." value={search} onChange={e => setSearch(e.target.value)} />

      {loading ? (
        <div className="loading">CARGANDO...</div>
      ) : filtrados.length === 0 ? (
        <div className="loading">🎉 Todo al día — no hay pendientes de fabricación.</div>
      ) : (
        <div className="familia-section">
          <div className="familia-head" style={{ backgroundColor: "#334155" }}>
            <div className="familia-icon">🏭</div>
            <div>
              <div className="familia-name">Pendientes de fabricación</div>
              <div className="familia-count">{filtrados.length} productos</div>
            </div>
          </div>
          <table>
            <thead>
              <tr>
                <th style={{width:'60%'}}>Producto</th>
                <th style={{width:'40%', textAlign:'right'}}>Restante a fabricar</th>
              </tr>
            </thead>
            <tbody>
              {filtrados.map((p, idx) => (
                <tr key={idx}>
                  <td>
                    <div className="prod-name">{p.producto}</div>
                    <div className="mono">{p.codigo}</div>
                  </td>
                  <td style={{textAlign:'right'}}>
                    <span className="restante-falta" style={{fontSize:16}}>{p.restante}</span>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function App() {
  const [session, setSession] = useState(null);
  const [rol, setRol] = useState(null);
  const [cargandoSesion, setCargandoSesion] = useState(true);
  const [enRecuperacion, setEnRecuperacion] = useState(false);

  const cargarPerfil = async (s) => {
    if (!s) { setRol(null); return; }
    const { data, error } = await supabaseClient
      .from('profiles')
      .select('rol')
      .eq('id', s.user.id)
      .single();
    setRol(error ? 'vendedor' : (data.rol || 'vendedor'));
  };

  useEffect(() => {
    supabaseClient.auth.getSession().then(async ({ data }) => {
      setSession(data.session);
      await cargarPerfil(data.session);
      setCargandoSesion(false);
    });
    const { data: listener } = supabaseClient.auth.onAuthStateChange(async (_event, s) => {
      if (_event === 'PASSWORD_RECOVERY') setEnRecuperacion(true);
      setSession(s);
      await cargarPerfil(s);
    });
    return () => listener.subscription.unsubscribe();
  }, []);

  if (cargandoSesion) return <div className="loading">Cargando...</div>;
  if (enRecuperacion) return <ResetPasswordScreen onDone={() => setEnRecuperacion(false)} />;
  if (!session) return <LoginScreen onLoggedIn={setSession} />;

  const onLogout = () => supabaseClient.auth.signOut();

  if (rol === 'produccion') {
    return <ProduccionView session={session} onLogout={onLogout} />;
  }

  return <Dashboard session={session} onLogout={onLogout} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
